{% load static %}
<html lang="ja">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>{% block title %}{% endblock %}</title>
</head>
<body style="margin-top: 90px;">
    <nav class="navbar navbar-expand-lg p-0 navbar-light bg-light fixed-top">
        <div class="container-fluid">
            <!-- SitePick のロゴ -->
            <a class="navbar-brand" href="">
                <img src="{% static 'edit_html/images/sitepick.png' %}" style="height:60px;">
            </a>

            {% comment %} <!-- ハンバーガー -->
            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu"
                    aria-controls="menu"
                    aria-expanded="false">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- メニュー -->
            <div class="collapse navbar-collapse justify-content-end" id="menu">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link mx-lg-5" href=""><h2>ホーム</h2></a></li>
                    <li class="nav-item"><a class="nav-link mx-lg-5" href=""><h2>保存したサイト</h2></a></li>
                    <li class="nav-item"><a class="nav-link mx-lg-5" href=""><h2>通知</h2></a></li>
                </ul>

                <span class="navbar-text mx-lg-5 fw-bold text-primary">
                    <h2>ログイン："{{ login_user }}"</h2>
                </span>

                <form class="d-flex">
                    <input class="form-control me-2" type="search" placeholder="検索">
                    <button class="btn btn-primary text-nowrap"><h2>検索</h2></button>
                </form>
            </div> {% endcomment %}
        </div>
    </nav>

    <!-- linebreaksbr を入れることで、\n が反映される-->
    <div class="container-fluid">
        {% block content %}{% endblock %}
    </div>

    <footer class="d-flex flex-column container-fluid fixed-bottom" style="background-color: #BEBEBE;">
        <div class="row my-3">
            <img src="{% static 'edit_html/images/sitepick.png' %}" alt="SitePick" style="width: 300px;">
        </div>
        <span class="row m-1 float-right">
            © 2026 Tomoya Irie
        </span>
    </footer>
</body>
</html>
