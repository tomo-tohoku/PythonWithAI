{% load static %}
<html lang="ja">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>{{ title }}</title>
</head>
<body style="margin-top: 120px;">
    <div class="container-fluid fixed-top">
        <div class="row">
            <div class="card col m-3" style="background-color: rgba(242, 242, 242, 0.8);">
                <div class="card-body">
                    <div class="container-fluid">
                        <div class="row">
                            <h4 class="card-text col-4">以下のサイトを保存しますか？</h4>
                            <a href="{% url 'result' %}?action=not_save" class="btn btn-danger col-3 offset-1">保存せずに戻る</a>
                            <a href="{% url 'result' %}?action=save" class="btn btn-primary col-3 offset-1">保存する</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <iframe src="/media/html/result/result_{{ unique_id }}.html" style="width:100%; height:100vh; border:none;"></iframe>
</body>
</html>
