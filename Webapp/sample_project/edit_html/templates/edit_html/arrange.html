{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>edit_html</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.css" crossorigin="anonymous">
</head>
<body>
    <h1 class="display-4 p-3 fw-bold text-primary bg-info">edit_html</h1>
    <div class="container-fluid">
        <h2 class="fw-bold">特定のタグやクラス、ＩＤに &lt;style&gt; タグを挿入する</h2>
        <form action="{% url 'result' %}" method="post">
            {% csrf_token %}
            <table class="table">
                <!-- colgroup ならすべての行に適用される -->
                <colgroup>
                    <col class="w-25">
                    <col class="w-75">
                </colgroup>

                {{ arrange_form.as_table }}
                <th>
                    <td>
                        <input type="submit" value="アレンジして表示する" class="btn btn-primary mt-2" name="arrange-later">
                    </td>
                </th>
            </table>
        </form>

        <h2 class="fw-bold">ＵＲＬから取得したＨＴＭＬデータ</h2>
        <pre class="p-3 rounded" style="background-color: #b6b6b6;">
            <code>
                {{ html_code }}
            </code>
        </pre>
    </div>
</body>
</html>
