{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>edit_html</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.css" crossorigin="anonymous">
</head>
<body class="container">
    <h1 class="display-4 text-primary bg-info">edit_html</h1>
    <!-- linebreaksbr を入れることで、\n が反映される-->
    <p class="display-5 text-danger">{{ error_msg|linebreaksbr }}</p>
    <form action="{% url 'result' %}" method="post">
        {% csrf_token %}
        <table class="table">
        {{ edit_form.as_table }}
            <th>
                <td>
                    <input type="submit" value="click" class="btn btn-primary mt-2">
                </td>
            </th>
        </table>
    </form>
</body>
</html>
