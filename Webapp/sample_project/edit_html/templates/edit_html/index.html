{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>edit_html</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.css" crossorigin="anonymous">
</head>
<body>
    <h1 class="display-4 p-3 fw-bold text-primary bg-info">edit_html</h1>
    <!-- linebreaksbr を入れることで、\n が反映される-->
    <div class="container-fluid">
        <h2 class = "fw-bold">すぐにＨＴＭＬデータを取得およびアレンジして表示する</h2>
        <p class="fw-bold text-danger">{{ error_msg_1|linebreaksbr }}</p>
        <form action="{% url 'result' %}" method="post">
            {% csrf_token %}
            <table class="table">
                <!-- colgroup ならすべての行に適用される -->
                <colgroup>
                    <col class="w-25">
                    <col class="w-75">
                </colgroup>

                {{ edit_form.as_table }}
                <th>
                    <td>
                        <input type="submit" value="取得 or アレンジ して表示する" class="btn btn-primary mt-2" name="get-it-now">
                    </td>
                </th>
            </table>
        </form>
        
        <h2 class = "fw-bold">最初にＨＴＭＬデータを取得して、そのデータを見てアレンジする</h2>
        <p class="fw-bold text-danger">{{ error_msg_2|linebreaksbr }}</p>
        <form action="{% url 'arrange' %}" method="post">
            {% csrf_token %}
            <table class="table">
                <!-- colgroup ならすべての行に適用される -->
                <colgroup>
                    <col class="w-25">
                    <col class="w-75">
                </colgroup>

                <tr>
                    <th>{{ edit_form.url.label_tag }}</th>
                    <td>{{ edit_form.url }}</td>
                </tr>
                <th>
                    <td>
                        <input type="submit" value="取得だけして後でアレンジする" class="btn btn-primary mt-2" name="arrange-later">
                    </td>
                </th>
            </table>
        </form>
    </div>
</body>
</html>
