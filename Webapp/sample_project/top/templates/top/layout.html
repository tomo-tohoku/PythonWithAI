{% load static %}
<html lang="ja">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>{% block title %}{% endblock %}</title>
</head>
<body style="margin-top: 90px;">
    <nav class="navbar navbar-expand navbar-light bg-light fixed-top">
      <div class="container-fluid">

        <!-- ロゴ -->
        <a class="navbar-brand" href="{% url 'index_top' %}">
          <img src="{% static 'edit_html/images/sitepick.png' %}" style="height:60px;">
        </a>

        <!-- 右側メニュー -->
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto align-items-center">

            <li class="nav-item">
              <a class="nav-link text-dark fs-5" href="{% url 'login' %}"><h2>ログイン</h2></a>
            </li>

            <li class="nav-item">
              <a class="nav-link text-dark fs-5" href="{% url 'register' %}"><h2>ユーザ登録</h2></a>
            </li>

          </ul>
        </div>

      </div>
    </nav>

    <!-- linebreaksbr を入れることで、\n が反映される-->
    <div class="container-fluid">
        {% block content %}{% endblock %}
    </div>

    <footer class="d-flex flex-column container-fluid fixed-bottom" style="background-color: #BEBEBE;">
        <div class="row my-3">
            <img src="{% static 'edit_html/images/sitepick.png' %}" alt="SitePick" style="width: 300px;">
        </div>
        <span class="row m-1 float-right">
            © 2026 Tomoya Irie
        </span>
    </footer>
</body>
</html>
